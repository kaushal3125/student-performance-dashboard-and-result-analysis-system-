<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Result Hub — Hi-Tech Student Analytics">
    <title>SYS_LOGIN // RESULT_HUB</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #05050a;
            --bg-panel: rgba(12, 16, 28, 0.85);
            --neon-cyan: #00f3ff;
            --neon-purple: #b500ff;
            --text-main: #e0e6ed;
            --border-solid: rgba(0, 243, 255, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.1), transparent 60%),
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 20px;
            overflow: hidden;
        }

        .login-box {
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-solid);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
            border-radius: 8px;
            padding: 3rem;
            width: 100%; max-width: 450px;
            position: relative;
        }
        
        .login-box::before {
            content: ''; position: absolute; top: -1px; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .login-box::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; color: #fff;
            text-transform: uppercase; letter-spacing: 2px;
            text-align: center; margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        .subtitle {
            text-align: center; color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif; letter-spacing: 3px; font-size: 0.8rem;
            margin-bottom: 2.5rem;
        }

        .form-label {
            font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
            color: #8a96a8; text-transform: uppercase; letter-spacing: 1px;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.8rem 1rem;
            border-radius: 4px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.8);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            color: #fff;
        }
        
        .input-group-text {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--neon-cyan); border-right: none;
            border-radius: 4px 0 0 4px;
        }
        .input-group .form-control { border-left: none; border-radius: 0 4px 4px 0; }

        .btn-login {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px; width: 100%;
            padding: 0.8rem; margin-top: 1.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }
        .btn-login:hover {
            background: var(--neon-cyan); color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .demo-creds {
            margin-top: 2rem; padding: 1rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .demo-creds h6 {
            color: var(--neon-purple); font-size: 0.8rem;
            margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-purple);
        }
        .cred-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #8a96a8; margin-bottom: 0.5rem; }
        .cred-row code { color: var(--neon-cyan); background: rgba(0,243,255,0.1); padding: 0.1rem 0.4rem; border-radius: 3px; }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        .scanner { position: absolute; left: 0; width: 100%; height: 100px; background: linear-gradient(to bottom, transparent, rgba(0,243,255,0.05)); animation: scan 4s linear infinite; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>
    <div class="scanner"></div>
    <div class="login-box">
        <div class="text-center mb-4">
            <i class="bi bi-cpu-fill" style="font-size: 3rem; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan);"></i>
        </div>
        <h2>SYS_AUTH_REQ</h2>
        <div class="subtitle">ENTER CREDENTIALS</div>

        <form method="POST">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="alert alert-danger" style="background: rgba(255,0,85,0.1); border-color: var(--neon-red); color: var(--neon-red);">
                {% for error in form.non_field_errors %}{{ error }}{% endfor %}
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">IDENTIFIER</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="USER_ID" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">PASS_CODE</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <div class="demo-creds">
            <h6><i class="bi bi-terminal me-2"></i>AVAILABLE_PROFILES</h6>
            <div class="cred-row"><span>SYS_ADMIN:</span> <code>admin / admin123</code></div>
            <div class="cred-row"><span>FACULTY:</span> <code>faculty / password123</code></div>
            <div class="cred-row"><span>STUDENT:</span> <code>student_mca001 / password123</code></div>
        </div>
    </div>
</body>
</html>
